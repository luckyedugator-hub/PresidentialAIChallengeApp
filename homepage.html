<html>
<head>
  <!-- Open Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  <!-- Yeseva One Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Need Fulfillment Homepage</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: white;
    }

    /* Header */
    .header {
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      align-items: center;
      background-color: #82bac4;
      padding: 0 clamp(1rem, 3.5vw, 3.5rem);
      height: clamp(70px, 8vw, 110px);
      width: 100%;
      gap: clamp(10px, 2vw, 30px);
    }

    /* Logo */
    .logo {
      width: clamp(45px, 6vw, 85px);
      height: clamp(45px, 6vw, 85px);
      display: block;
      flex-shrink: 0;
    }

    /* Nav links */
    .links {
      list-style-type: none;
      display: flex;
      gap: clamp(20px, 6vw, 120px);
      padding-left: clamp(10px, 4vw, 60px);
      font-family: "Open Sans", sans-serif;
      flex-shrink: 0;
    }

    .links li a {
      color: white;
      font-size: clamp(16px, 2.2vw, 32px);
      text-decoration: none;
    }

    /* Search box */
    .search-box {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-box input {
      padding-left: 16px;
      border: 3px solid white;
      height: clamp(36px, 4.5vw, 60px);
      width: clamp(140px, 22vw, 380px);
      border-radius: 30px;
      font-size: clamp(12px, 1.4vw, 20px);
      font-family: "Open Sans", sans-serif;
      outline: none;
    }

    /* User icon */
    .icon {
      width: clamp(45px, 6vw, 85px);
      height: clamp(45px, 6vw, 85px);
      display: block;
      flex-shrink: 0;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Heading */
    .title {
      padding-top: clamp(90px, 12vw, 170px);
      text-align: center;
    }

    .title h1 {
      font-family: "Yeseva One", serif;
      font-size: clamp(32px, 6vw, 85px);
      color: #006078;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <nav>
    <div class="header">
      <a href="need_fulfillment_homepage.html">
        <img src="logo-example.png" class="logo">
      </a>
      <ul class="links">
        <li><a href="">Communities</a></li>
        <li><a href="">Non-Profits</a></li>
      </ul>
      <div class="search-box">
        <input type="text" placeholder="Search here">
      </div>
      <a href="signup-login-page.html">
        <img src="user-icon.png" class="icon">
      </a>
    </div>
  </nav>

  <div class="title">
    <h1>Phone A Friend</h1>
  </div>
</body>
</html>
