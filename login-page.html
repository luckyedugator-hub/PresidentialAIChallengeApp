<html>
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Yeseva+One&display=swap" rel="stylesheet">


<title>Authentication Page</title>
<style>

/* Background */

body {
align-items: center;
justify-content: center;
display: flex;
margin: 0;
background: linear-gradient(135deg, #286076, #a7b5df);
min-height: 100vh;
}

/* Main Div Box */

.main-div {
border-radius: 15px;
height: 300px;
width: 250px;
background-color: #286076;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
height: 600px;
width: 450px;
color: #ffd4d1;
}

.main-div h2{
color: #ffd4d1;
font-size: 30px;
text-align: left;
margin-bottom: 10px;
width: 23rem;
font-family: "DM Sans", sans serif;
}


/* Input Textbox */

input {
border: 2.5px solid #ffd4d1;
border-radius: 25px;
height: 3.5rem;
width: 23rem;
gap: 10rem
}

/* Button */

button {
border-radius: 30px;
border: 3px solid #ffd4d1;
background-color: #ffd4d1;
margin-top: 2rem;
height: 50px;
width: 125px;
font-size: 25px;
font-family: "DM Sans", sans-serif;
color: #286076;
margin-top: 5rem;
margin-bottom: 0.5rem;
}

/* Sign up page link */

h3 {
color: #8fb9c2;
font-family: "Open Sans", sans-serif;
font-weight: 600;
}

</style>
</head>
<body>
<div class = "main-div">
<h2>Username</h2>
<input type = "text"></input>
<div class = "gap">
</div>
<h2 style = "margin-top: 4rem;">Password</h2>
<input type = "text"></input>
<button><B>Log In</B></button>
<h3>Don't have an account? Sign up<h3>
</div>
</body>
</html>
